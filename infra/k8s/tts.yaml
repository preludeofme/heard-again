apiVersion: v1
kind: Service
metadata:
  name: tts
  namespace: heard-again
  annotations:
    cloud.google.com/load-balancer-type: "Internal"
spec:
  selector:
    app: tts
  ports:
    - port: 4779
      targetPort: 4779
  type: LoadBalancer
  loadBalancerIP: "10.0.15.200"
  # Session affinity routes a given client to the same pod for the duration of
  # an upload→train sequence. Voice profiles are GCS-backed (cross-pod), but
  # reference audio used during training is still local-to-pod.
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 600
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tts-reference-audio
  namespace: heard-again
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard-rwo
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tts
  namespace: heard-again
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tts
  template:
    metadata:
      labels:
        app: tts
    spec:
      serviceAccountName: tts
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Equal"
          value: "present"
          effect: "NoSchedule"
      initContainers:
        # Download model weights from GCS on pod startup if not already cached
        - name: model-init
          image: google/cloud-sdk:slim
          command:
            - /bin/bash
            - -c
            - |
              if [ ! -f /app/models/.downloaded ]; then
                echo "Syncing TTS models from GCS..."
                if gsutil -m rsync -r gs://${GCS_TTS_MODELS_BUCKET}/models/ /app/models/ 2>&1; then
                  touch /app/models/.downloaded
                  echo "Models synced from GCS."
                else
                  echo "GCS sync failed or bucket empty — models will be fetched from HuggingFace at runtime."
                fi
              else
                echo "Models already present, skipping download"
              fi
          env:
            - name: GCS_TTS_MODELS_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: heard-again-config
                  key: tts-models-bucket
          volumeMounts:
            - name: tts-models
              mountPath: /app/models
      containers:
        - name: tts
          image: REGION-docker.pkg.dev/PROJECT_ID/heard-again-prod/tts:latest
          ports:
            - containerPort: 4779
          env:
            - name: TTS_PORT
              value: "4779"
            - name: MODEL_DEVICE
              value: "cuda"
            - name: ENVIRONMENT
              value: "production"
            - name: TTS_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: heard-again-secrets
                  key: tts-service-token
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: heard-again-secrets
                  key: redis-url
            # GCS bucket for voice profile storage — enables cross-pod access
            - name: GCS_TTS_MODELS_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: heard-again-config
                  key: tts-models-bucket
            - name: HF_HOME
              value: "/app/models"
          volumeMounts:
            - name: tts-models
              mountPath: /app/models
            # Voice profiles cache — ephemeral local copy; GCS is source of truth
            - name: tts-voice-cache
              mountPath: /app/data/voice_profiles
            - name: tts-reference-audio
              mountPath: /app/data/reference_audio
            - name: tts-generated
              mountPath: /app/data/generated_audio
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "12Gi"
              nvidia.com/gpu: "1"
          livenessProbe:
            httpGet:
              path: /api/tts/health
              port: 4779
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/tts/health
              port: 4779
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
      volumes:
        - name: tts-models
          emptyDir: {}
        # emptyDir — voice profiles are downloaded from GCS on demand per pod
        - name: tts-voice-cache
          emptyDir:
            sizeLimit: 50Gi
        - name: tts-reference-audio
          persistentVolumeClaim:
            claimName: tts-reference-audio
        - name: tts-generated
          emptyDir:
            sizeLimit: 10Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tts
  namespace: heard-again
  annotations:
    iam.gke.io/workload-identity-pool: PROJECT_ID.svc.id.goog
    iam.gke.io/service-account: heard-again-prod-tts@PROJECT_ID.iam.gserviceaccount.com

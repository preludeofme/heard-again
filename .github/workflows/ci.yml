name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install All Dependencies
        run: npm run install:all

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Type Check UI
        run: cd UI && npm run type-check || npx tsc --noEmit

      - name: Type Check Chat
        run: cd Chat && npm run type-check

      - name: Lint UI
        run: cd UI && npm run lint

      - name: Lint Chat
        run: cd Chat && npm run lint

      - name: Run UI Tests
        run: cd UI && npm test -- --passWithNoTests

      - name: Run Chat Tests
        run: cd Chat && npm test -- --passWithNoTests

      - name: Build UI
        run: cd UI && npm run build
        env:
          NEXTAUTH_SECRET: 'dummy-secret-for-ci-build'

      - name: Build Chat
        run: cd Chat && npm run build

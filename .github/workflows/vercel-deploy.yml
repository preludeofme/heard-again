name: Vercel Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          NEXTAUTH_SECRET: 'dummy-secret-for-ci-build'
          NEXTAUTH_URL: 'http://localhost:4777'

      - name: Trigger Vercel deployment via git integration
        run: echo "Build checks passed. Deployment is handled by Vercel Git Integration."

version: '3.8'

services:
  # Chat System
  chat:
    build:
      context: ./Chat
      dockerfile: docker/Dockerfile
    ports:
      - "4778:4778"
    environment:
      - NODE_ENV=production
      - PORT=4778
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/heard_again
      - REDIS_URL=redis://redis:6379
      - CHROMA_URL=http://chromadb:8000
      - OLLAMA_URL=http://ollama:11434
      - TTS_SERVICE_URL=http://tts:4779
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # Ollama LLM Service (optional - requires GPU)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    profiles:
      - with-llm

  # Main Next.js application
  app:
    build:
      context: .
      dockerfile: UI/Dockerfile
    ports:
      - "4777:4777"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/heard_again
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-this-in-production}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:4777}
      - TTS_SERVICE_URL=${TTS_SERVICE_URL:-http://tts:4779}
      - CHAT_SYSTEM_URL=${CHAT_SYSTEM_URL:-http://chat:4778}
      - REDIS_URL=redis://redis:6379
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - REQUIRE_SIGNED_URLS=true
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - generated:/app/generated
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /app/tmp:noexec,nosuid,size=100m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4777/api/instance/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=heard_again
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ClamAV antivirus service (mandatory for production)
  clamav:
    image: clamav/clamav:stable
    container_name: clamav
    restart: unless-stopped
    environment:
      - CLAMAV_NO_CLAMD=false
      - CLAMAV_NO_FRESHCLAN=false
    volumes:
      - clamav_db:/var/lib/clamav
      - /var/run/clamav:/var/run/clamav
    ports:
      - "3310:3310"
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Redis for distributed rate limiting and caching
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # TTS Service (optional - requires GPU)
  tts:
    build:
      context: ./TTS
      dockerfile: Dockerfile
    ports:
      - "4779:4779"
    environment:
      - PORT=4779
      - MODEL_DEVICE=cuda
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - STAGING_URL=${STAGING_URL}
    volumes:
      - tts_models:/app/models
      - ./TTS/generated:/app/generated
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    profiles:
      - with-tts

  # ChromaDB for vector search (RAG)
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8004:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_PORT=8000
      - ALLOW_RESET=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  uploads:
  tts_models:
  redis_data:
  clamav_db:
  chroma_data:
  ollama_data:

services:
  # Chat System — internal only, not reachable from the host
  chat:
    build:
      context: ./Chat
      dockerfile: docker/Dockerfile
    expose:
      - "4778"
    environment:
      - NODE_ENV=production
      - PORT=4778
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/heard_again?connection_limit=10
      - REDIS_URL=redis://redis:6379
      - CHROMA_URL=http://chromadb:8000
      - OLLAMA_URL=http://ollama:11434
      - TTS_SERVICE_URL=http://tts:4779
      - CHAT_SERVICE_SECRET=${CHAT_SERVICE_SECRET:?CHAT_SERVICE_SECRET must be set}
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 1G
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4778/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Ollama LLM Service
  ollama:
    image: ollama/ollama:latest
    expose:
      - "11434"
    networks:
      - internal
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 4G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    profiles:
      - with-llm

  # Main Next.js application
  app:
    build:
      context: .
      dockerfile: UI/Dockerfile
    ports:
      - "4776:4777"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/heard_again?connection_limit=20
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?NEXTAUTH_SECRET must be set}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:4777}
      - TTS_SERVICE_URL=${TTS_SERVICE_URL:-http://tts:4779}
      - CHAT_SYSTEM_URL=${CHAT_SYSTEM_URL:-http://chat:4778}
      - CHAT_SERVICE_SECRET=${CHAT_SERVICE_SECRET:?CHAT_SERVICE_SECRET must be set}
      - TTS_SERVICE_TOKEN=${TTS_SERVICE_TOKEN:?TTS_SERVICE_TOKEN must be set}
      - REDIS_URL=redis://redis:6379
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - REQUIRE_SIGNED_URLS=true
      - NODE_ENV=production
      - AUDIO_GENERATION_ENABLED=false
      - NARRATION_WORKER_ENABLED=false
      - STORAGE_MODE=gcs
      - STORAGE_EMULATOR_HOST=http://fake-gcs:4443
      - GCS_BUCKET_NAME=local-dev-bucket
      - GOOGLE_CLOUD_PROJECT=local-dev
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
      fake-gcs:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          memory: 2G
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /app/tmp:noexec,nosuid,size=100m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4777/api/instance/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (min 24 chars)}
      - POSTGRES_DB=heard_again
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ClamAV antivirus service
  clamav:
    image: clamav/clamav:stable
    container_name: clamav
    restart: unless-stopped
    environment:
      - CLAMAV_NO_CLAMD=false
      - CLAMAV_NO_FRESHCLAN=false
    volumes:
      - clamav_db:/var/lib/clamav
      - /var/run/clamav:/var/run/clamav
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Redis for distributed rate limiting and caching
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # TTS Service
  tts:
    build:
      context: ./TTS
      dockerfile: Dockerfile
    expose:
      - "4779"
    environment:
      - TTS_PORT=4779
      - MODEL_DEVICE=cuda
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - STAGING_URL=${STAGING_URL}
      - REDIS_URL=redis://redis:6379
    volumes:
      - tts_models:/app/models
      - generated_audio:/app/generated
      - reference_audio:/app/reference_audio
      - voice_profiles:/app/voice_profiles
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 12G
        reservations:
          memory: 4G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4779/api/tts/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles:
      - with-tts

  # ChromaDB for vector search (RAG)
  chromadb:
    image: chromadb/chroma:latest
    expose:
      - "8000"
    environment:
      - IS_PERSISTENT=TRUE
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_PORT=8000
      - ALLOW_RESET=FALSE
      - ANONYMIZED_TELEMETRY=FALSE
      - CHROMA_SERVER_AUTHN_PROVIDER=chromadb.auth.basic_authn.BasicAuthenticationServerProvider
      - CHROMA_SERVER_AUTHN_CREDENTIALS=${CHROMA_CREDENTIALS:?CHROMA_CREDENTIALS must be set}
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 4G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  # Ingestion Worker
  ingestion-worker:
    build:
      context: ./Chat
      dockerfile: docker/Dockerfile.worker
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/heard_again?connection_limit=5
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CHROMA_URL=http://chromadb:8000
      - OLLAMA_URL=http://ollama:11434
      - CHAT_SERVICE_SECRET=${CHAT_SERVICE_SECRET:?CHAT_SERVICE_SECRET must be set}
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      ollama:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    profiles:
      - with-ingestion

  # Narration Worker — BullMQ worker for audio rendering, separated from UI process
  narration-worker:
    build:
      context: .
      dockerfile: UI/Dockerfile.worker
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/heard_again?connection_limit=5
      - REDIS_URL=redis://redis:6379
      - TTS_SERVICE_URL=${TTS_SERVICE_URL:-http://tts:4779}
      - TTS_SERVICE_TOKEN=${TTS_SERVICE_TOKEN:?TTS_SERVICE_TOKEN must be set}
      - STORAGE_MODE=${STORAGE_MODE:-local}
      - UPLOAD_DIR=/app/uploads
      - GCP_BUCKET_NAME=${GCP_BUCKET_NAME}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - NARRATION_WORKER_ENABLED=true
      - NARRATION_WORKER_CONCURRENCY=${NARRATION_WORKER_CONCURRENCY:-1}
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # Fake GCS server for local GCS emulation
  fake-gcs:
    image: fsouza/fake-gcs-server
    ports:
      - "4443:4443"
    command:
      - "-scheme"
      - "http"
      - "-port"
      - "4443"
      - "-external-url"
      - "http://localhost:4443"
    volumes:
      - fake-gcs-data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4443/storage/v1/b"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  uploads:
  generated_audio:
  tts_models:
  reference_audio:
  voice_profiles:
  redis_data:
  clamav_db:
  chroma_data:
  ollama_data:
  fake-gcs-data:

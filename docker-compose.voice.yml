version: '3.8'

services:
  # GPT-SoVITS API Service
  gpt-sovits:
    image: breakstring/gpt-sovits:latest
    container_name: gpt-sovits-api
    ports:
      - "9888:9874"  # GPT-SoVITS Gradio Web UI (changed to 9888)
      - "9873:9873"  # GPT-SoVITS Web UI (alternative)
      - "9880:9880"  # GPT-SoVITS FastAPI TTS Inference
    volumes:
      - ./models:/app/models                         # Persistent model storage
      - ./logs:/app/logs                              # Logs
      - ./uploads:/app/uploads                        # Audio uploads
      - ./output:/workspace/output                    # Preprocessing output (slicer, ASR, etc.)
      - ./weights/sovits:/workspace/SoVITS_weights    # Trained SoVITS models (persisted)
      - ./weights/gpt:/workspace/GPT_weights          # Trained GPT models (persisted)
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - SHARE_MEMORY=16G
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=9874
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    shm_size: 16gb
    restart: unless-stopped
    networks:
      - voice-network

  # Redis for caching and job queue
  redis:
    image: redis:7-alpine
    container_name: voice-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - voice-network

  # PostgreSQL for metadata
  postgres:
    image: postgres:15-alpine
    container_name: voice-postgres
    ports:
      - "5433:5432"  # Changed to 5433 to avoid conflict with system PostgreSQL
    environment:
      POSTGRES_DB: heard_again
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - voice-network

networks:
  voice-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

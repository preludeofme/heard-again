# SonarQube configuration for Heard Again Application

# SonarQube server configuration
sonar.projectKey=heard-again
sonar.projectName=Heard Again Application
sonar.projectVersion=1.0.0

# Source code paths
sonar.sources=src,docs,tts-service
sonar.tests=src/__tests__
sonar.test.inclusions=**/*.test.ts,**/*.test.js,**/*.spec.ts,**/*.spec.js

# Language-specific properties
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/.next/**,**/generated/**,**/*.min.js,**/*.min.css
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**

# Code coverage
sonar.coverage.exclusions=**/*.config.js,**/*.config.ts,**/migrations/**,**/seed.ts,**/next-env.d.ts

# Duplication
sonar.cpd.exclusions=**/*.config.js,**/*.config.ts,**/migrations/**

# Encoding
sonar.sourceEncoding=UTF-8

# TypeScript specific
sonar.typescript.node=package.json

# Security hotspots
sonar.hotspots.enabled=true

# Additional parameters
sonar.host.url=http://localhost:9000
sonar.token=squ_3131a69179595d70506b93facb243d413e973df0

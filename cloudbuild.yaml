steps:
  # ── Build images ─────────────────────────────────────────────────────────

  - id: build-ui
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=UI/Dockerfile
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/$_APP_NAME-$_ENV/ui:$COMMIT_SHA
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/$_APP_NAME-$_ENV/ui:latest
      - --cache-from=$_REGION-docker.pkg.dev/$PROJECT_ID/$_APP_NAME-$_ENV/ui:latest
      - .

  - id: build-ui-worker
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=UI/Dockerfile.worker
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/$_APP_NAME-$_ENV/ui-worker:$COMMIT_SHA
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/$_APP_NAME-$_ENV/ui-worker:latest
      - --cache-from=$_REGION-docker.pkg.dev/$PROJECT_ID/$_APP_NAME-$_ENV/ui-worker:latest
      - .

  - id: build-chat
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=Chat/docker/Dockerfile
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/$_APP_NAME-$_ENV/chat:$COMMIT_SHA
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/$_APP_NAME-$_ENV/chat:latest
      - --cache-from=$_REGION-docker.pkg.dev/$PROJECT_ID/$_APP_NAME-$_ENV/chat:latest
      - .
    dir: Chat

  - id: build-tts
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=Dockerfile
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/$_APP_NAME-$_ENV/tts:$COMMIT_SHA
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/$_APP_NAME-$_ENV/tts:latest
      - --cache-from=$_REGION-docker.pkg.dev/$PROJECT_ID/$_APP_NAME-$_ENV/tts:latest
      - .
    dir: TTS

  # ── Push images ──────────────────────────────────────────────────────────

  - id: push-ui
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_APP_NAME-$_ENV/ui
    waitFor: [build-ui]

  - id: push-ui-worker
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_APP_NAME-$_ENV/ui-worker
    waitFor: [build-ui-worker]

  - id: push-chat
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_APP_NAME-$_ENV/chat
    waitFor: [build-chat]

  - id: push-tts
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_APP_NAME-$_ENV/tts
    waitFor: [build-tts]

  # ── Database migrations ──────────────────────────────────────────────────
  # Runs prisma migrate deploy against Cloud SQL via the Auth Proxy

  - id: db-migrate
    name: node:18-alpine
    entrypoint: sh
    args:
      - -c
      - |
        apk add --no-cache curl
        # Download Cloud SQL Auth Proxy
        curl -o /usr/local/bin/cloud-sql-proxy \
          https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.6.1/cloud-sql-proxy.linux.amd64
        chmod +x /usr/local/bin/cloud-sql-proxy
        # Start proxy in background
        cloud-sql-proxy --port=5432 $PROJECT_ID:$_REGION:$_DB_INSTANCE &
        PROXY_PID=$!
        sleep 3
        # Run migrations
        cd UI
        npm ci
        DATABASE_URL="postgresql://postgres:$$POSTGRES_PASSWORD@localhost:5432/heard_again" \
          npx prisma migrate deploy --schema=../prisma/schema.prisma
        kill $PROXY_PID
    secretEnv: [POSTGRES_PASSWORD]
    waitFor: [push-ui, push-chat]

  # ── Deploy Cloud Run services ────────────────────────────────────────────

  - id: deploy-ui
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    args:
      - gcloud
      - run
      - deploy
      - $_APP_NAME-$_ENV-ui
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_APP_NAME-$_ENV/ui:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
    waitFor: [db-migrate]

  - id: deploy-chat
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    args:
      - gcloud
      - run
      - deploy
      - $_APP_NAME-$_ENV-chat
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_APP_NAME-$_ENV/chat:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
    waitFor: [db-migrate]

  # ── Deploy GKE workloads ─────────────────────────────────────────────────

  - id: get-gke-credentials
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    args:
      - gcloud
      - container
      - clusters
      - get-credentials
      - $_APP_NAME-$_ENV-cluster
      - --zone=$_ZONE
    waitFor: [push-tts]

  - id: deploy-gke
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: kubectl
    args:
      - apply
      - -f
      - infra/k8s/
    waitFor: [get-gke-credentials]

substitutions:
  _REGION: us-central1
  _ZONE: us-central1-a
  _ENV: prod
  _APP_NAME: heard-again
  _DB_INSTANCE: heard-again-prod-db

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/heard-again-prod-postgres-password/versions/latest
      env: POSTGRES_PASSWORD

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_APP_NAME-$_ENV/ui:$COMMIT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_APP_NAME-$_ENV/ui-worker:$COMMIT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_APP_NAME-$_ENV/chat:$COMMIT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_APP_NAME-$_ENV/tts:$COMMIT_SHA
